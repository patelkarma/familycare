name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend (Spring Boot)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Compile
        run: ./mvnw -B compile

      - name: Test
        run: ./mvnw -B test
        env:
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/dummy
          SPRING_DATASOURCE_USERNAME: dummy
          SPRING_DATASOURCE_PASSWORD: dummy
          SPRING_DATA_REDIS_URL: redis://localhost:6379
          JWT_SECRET: ci-only-secret-key-minimum-256-bits-long-key-here-please-do-not-use-in-prod

      - name: Package
        run: ./mvnw -B package -DskipTests

  frontend:
    name: Frontend (React + Vite)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint --if-present

      - name: Build
        run: npm run build
        env:
          VITE_API_BASE_URL: https://example.com
