name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend (Spring Boot)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Compile
        run: ./mvnw -B compile

      - name: Unit tests
        run: ./mvnw -B test

      - name: Integration tests (Testcontainers)
        run: ./mvnw -B test -Pintegration -Dtest='*IntegrationTest'

      - name: Package
        run: ./mvnw -B package -DskipTests

  frontend:
    name: Frontend (React + Vite)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint --if-present

      - name: Test
        run: npm test --if-present

      - name: Build
        run: npm run build
        env:
          VITE_API_BASE_URL: https://example.com

  deploy:
    name: Deploy (Render + Vercel)
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    # Only deploy on a direct push to main — never on PRs or feature branches.
    # Both backend AND frontend test jobs must succeed (`needs: [...]`); if either
    # fails, this job is skipped and the live site stays on the last good build.
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    # GitHub Actions doesn't allow `secrets.*` directly in step-level `if:` —
    # surface them as env vars at job level, then guard on `env.*` instead.
    env:
      RENDER_DEPLOY_HOOK: ${{ secrets.RENDER_DEPLOY_HOOK }}
      VERCEL_DEPLOY_HOOK: ${{ secrets.VERCEL_DEPLOY_HOOK }}
    steps:
      - name: Trigger Render backend deploy
        if: env.RENDER_DEPLOY_HOOK != ''
        run: |
          echo "Triggering Render deploy..."
          curl -fsS -X POST "$RENDER_DEPLOY_HOOK"
          echo "Render deploy queued."

      - name: Trigger Vercel frontend deploy
        if: env.VERCEL_DEPLOY_HOOK != ''
        run: |
          echo "Triggering Vercel deploy..."
          curl -fsS -X POST "$VERCEL_DEPLOY_HOOK"
          echo "Vercel deploy queued."
