<svg width="500" height="500" viewBox="0 0 500 500" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F5A623;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#E8920F;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="heartGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFFFF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FEF3DC;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#E8920F" flood-opacity="0.35"/>
    </filter>
    <filter id="innerShadow">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000000" flood-opacity="0.08"/>
    </filter>
    <clipPath id="roundClip">
      <rect width="500" height="500" rx="120" ry="120"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="500" height="500" rx="120" ry="120" fill="url(#bgGrad)" filter="url(#shadow)"/>

  <!-- Subtle inner highlight -->
  <rect width="500" height="250" rx="120" ry="120" fill="white" fill-opacity="0.07" clip-path="url(#roundClip)"/>

  <!-- House/Home shape (family home) -->
  <g filter="url(#innerShadow)">
    <!-- Roof -->
    <polygon points="250,110 140,210 360,210" fill="white" fill-opacity="0.95"/>
    <!-- Chimney -->
    <rect x="295" y="130" width="28" height="55" rx="4" fill="white" fill-opacity="0.95"/>
    <!-- House body -->
    <rect x="152" y="205" width="196" height="140" rx="8" fill="white" fill-opacity="0.95"/>
    <!-- Door -->
    <rect x="222" y="280" width="56" height="65" rx="10" fill="#F5A623"/>
    <!-- Door knob -->
    <circle cx="270" cy="314" r="5" fill="white"/>
    <!-- Left window -->
    <rect x="170" y="230" width="44" height="40" rx="6" fill="#FEF3DC"/>
    <line x1="192" y1="230" x2="192" y2="270" stroke="#F5A623" stroke-width="2.5"/>
    <line x1="170" y1="250" x2="214" y2="250" stroke="#F5A623" stroke-width="2.5"/>
    <!-- Right window -->
    <rect x="286" y="230" width="44" height="40" rx="6" fill="#FEF3DC"/>
    <line x1="308" y1="230" x2="308" y2="270" stroke="#F5A623" stroke-width="2.5"/>
    <line x1="286" y1="250" x2="330" y2="250" stroke="#F5A623" stroke-width="2.5"/>
  </g>

  <!-- Heart with pulse line overlapping house -->
  <g transform="translate(250, 255)">
    <!-- Heart shape -->
    <path d="M0,18 C0,18 -42,-8 -42,-28 C-42,-46 -28,-56 -14,-52 C-7,-50 0,-44 0,-44 C0,-44 7,-50 14,-52 C28,-56 42,-46 42,-28 C42,-8 0,18 0,18 Z"
          fill="#F5A623" stroke="white" stroke-width="3"/>
    <!-- Pulse/ECG line inside heart -->
    <polyline points="-22,-12 -14,-12 -10,-24 -4,2 2,-18 8,-12 22,-12"
              fill="none" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- Family dots (3 people icons simplified) -->
  <g opacity="0.9">
    <!-- Person 1 (child) -->
    <circle cx="175" cy="368" r="10" fill="white" fill-opacity="0.85"/>
    <path d="M162,395 Q175,385 188,395" fill="white" fill-opacity="0.85"/>
    <!-- Person 2 (adult) -->
    <circle cx="250" cy="362" r="13" fill="white"/>
    <path d="M234,393 Q250,380 266,393" fill="white"/>
    <!-- Person 3 (adult) -->
    <circle cx="325" cy="368" r="10" fill="white" fill-opacity="0.85"/>
    <path d="M312,395 Q325,385 338,395" fill="white" fill-opacity="0.85"/>
  </g>

  <!-- Bottom text -->
  <text x="250" y="448" font-family="'Arial Rounded MT Bold', 'Arial', sans-serif"
        font-size="42" font-weight="800" fill="white" text-anchor="middle"
        letter-spacing="1">FamilyCare</text>

  <!-- Tagline -->
  <text x="250" y="475" font-family="'Arial', sans-serif"
        font-size="16" font-weight="400" fill="white" fill-opacity="0.85"
        text-anchor="middle" letter-spacing="2">HEALTH DASHBOARD</text>
</svg>
