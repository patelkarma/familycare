spring.application.name=familycare

# Database - loaded from .env (local) or env vars (Render). Never hardcode.
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# Limit connection pool for Supabase free tier
spring.datasource.hikari.maximum-pool-size=2
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.open-in-view=false
# Pin dialect so connection failures surface as connection errors instead of "Unable to determine Dialect"
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Redis - loaded from .env (local) or env vars (Render). Never hardcode.
spring.data.redis.url=${SPRING_DATA_REDIS_URL}

# JWT - REQUIRED. App fails to start if JWT_SECRET is not set (must be >= 256 bits).
jwt.secret=${JWT_SECRET}
jwt.expiration=86400000

# Cloudinary
cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME:default}
cloudinary.api-key=${CLOUDINARY_API_KEY:default}
cloudinary.api-secret=${CLOUDINARY_API_SECRET:default}

# Multipart file upload (reports and avatars)
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=12MB

# Gemini (Google Generative Language API — free tier)
gemini.api-key=${GEMINI_API_KEY:default}
gemini.model=${GEMINI_MODEL:gemini-2.0-flash}

# Twilio
twilio.account-sid=${TWILIO_ACCOUNT_SID:default}
twilio.auth-token=${TWILIO_AUTH_TOKEN:default}
twilio.whatsapp-from=whatsapp:+14155238886
twilio.whatsapp-sandbox-number=+14155238886
twilio.whatsapp-sandbox-code=${TWILIO_WHATSAPP_SANDBOX_CODE:degree-idea}
twilio.webhook-verify=${TWILIO_WEBHOOK_VERIFY:true}

# Public-facing URL Twilio sees when calling our webhook (ngrok in dev, Render in prod).
# Used to verify X-Twilio-Signature.
app.public-base-url=${PUBLIC_BASE_URL:}

# OpenAPI / Swagger UI
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.tags-sorter=alpha
springdoc.swagger-ui.operations-sorter=alpha

# Server - Render injects PORT at runtime; default 8080 for local dev.
server.port=${PORT:8080}

# Actuator: expose health + prometheus only. Health is the existing /api/health
# probe already used by UptimeRobot; /actuator/prometheus is scrapable so a
# Grafana Cloud free tier can graph the FamilyCare-specific counters wired up
# via MeterRegistry.
management.endpoints.web.exposure.include=health,prometheus,info
management.endpoint.health.show-details=never
management.endpoint.health.probes.enabled=true
management.metrics.tags.application=familycare
management.prometheus.metrics.export.enabled=true

# Resilience4j: circuit breaker + retry around Twilio + Gemini.
# Rationale: Twilio sandbox throttles + Gemini quota-exhausts; without a
# breaker every request still calls the dead provider, eats latency, and
# blows the user up with a confusing error. With the breaker, after 50% of
# the last 10 calls fail we trip OPEN for 30s, fall back to a polite
# return-false (WhatsApp) or "AI temporarily unavailable" (Gemini), then
# probe with one HALF_OPEN call before re-closing.
resilience4j.circuitbreaker.instances.twilio.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.twilio.sliding-window-size=10
resilience4j.circuitbreaker.instances.twilio.minimum-number-of-calls=5
resilience4j.circuitbreaker.instances.twilio.wait-duration-in-open-state=30s
resilience4j.circuitbreaker.instances.twilio.permitted-number-of-calls-in-half-open-state=1
resilience4j.circuitbreaker.instances.twilio.register-health-indicator=true

resilience4j.circuitbreaker.instances.gemini.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.gemini.sliding-window-size=10
resilience4j.circuitbreaker.instances.gemini.minimum-number-of-calls=5
resilience4j.circuitbreaker.instances.gemini.wait-duration-in-open-state=60s
resilience4j.circuitbreaker.instances.gemini.permitted-number-of-calls-in-half-open-state=1
resilience4j.circuitbreaker.instances.gemini.register-health-indicator=true

# Retry on transient failures only. Twilio: 1 retry with 1s backoff. Gemini:
# 1 retry with 2s backoff (LLM cold-start is the typical transient).
# 4xx (auth/quota) is NOT retried — that's a client error, not a blip.
resilience4j.retry.instances.twilio.max-attempts=2
resilience4j.retry.instances.twilio.wait-duration=1s
resilience4j.retry.instances.gemini.max-attempts=2
resilience4j.retry.instances.gemini.wait-duration=2s
# Don't retry on BadRequestException — that's auth/quota/404 (the user has to
# fix their key or model), and a retry just doubles the angry log entry.
resilience4j.retry.instances.gemini.ignore-exceptions=com.familycare.exception.CustomExceptions$BadRequestException
resilience4j.circuitbreaker.instances.gemini.ignore-exceptions=com.familycare.exception.CustomExceptions$BadRequestException