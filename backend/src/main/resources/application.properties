spring.application.name=familycare

# Database - loaded from .env (local) or env vars (Render). Never hardcode.
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# Limit connection pool for Supabase free tier
spring.datasource.hikari.maximum-pool-size=2
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.open-in-view=false
# Pin dialect so connection failures surface as connection errors instead of "Unable to determine Dialect"
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Redis - loaded from .env (local) or env vars (Render). Never hardcode.
spring.data.redis.url=${SPRING_DATA_REDIS_URL}

# JWT - REQUIRED. App fails to start if JWT_SECRET is not set (must be >= 256 bits).
jwt.secret=${JWT_SECRET}
jwt.expiration=86400000

# Cloudinary
cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME:default}
cloudinary.api-key=${CLOUDINARY_API_KEY:default}
cloudinary.api-secret=${CLOUDINARY_API_SECRET:default}

# Multipart file upload (reports and avatars)
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=12MB

# Gemini (Google Generative Language API — free tier)
gemini.api-key=${GEMINI_API_KEY:default}
gemini.model=${GEMINI_MODEL:gemini-2.0-flash}

# Twilio
twilio.account-sid=${TWILIO_ACCOUNT_SID:default}
twilio.auth-token=${TWILIO_AUTH_TOKEN:default}
twilio.whatsapp-from=whatsapp:+14155238886
twilio.whatsapp-sandbox-number=+14155238886
twilio.whatsapp-sandbox-code=${TWILIO_WHATSAPP_SANDBOX_CODE:degree-idea}
twilio.webhook-verify=${TWILIO_WEBHOOK_VERIFY:true}

# Public-facing URL Twilio sees when calling our webhook (ngrok in dev, Render in prod).
# Used to verify X-Twilio-Signature.
app.public-base-url=${PUBLIC_BASE_URL:}

# OpenAPI / Swagger UI
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.tags-sorter=alpha
springdoc.swagger-ui.operations-sorter=alpha

# Server - Render injects PORT at runtime; default 8080 for local dev.
server.port=${PORT:8080}